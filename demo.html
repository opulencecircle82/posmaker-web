<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>POSMaker Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--accent:#00b4d8;--bg:#09090f;--s1:#111120;--s2:#191929;--border:#252540;--text:#f0f0f8;--radius:8px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column}

/* DEMO BANNER */
.demo-banner{background:#f59e0b;color:#000;font-size:12px;font-weight:700;text-align:center;padding:6px 12px;flex-shrink:0;letter-spacing:.3px}
.demo-banner a{color:#000;text-decoration:underline;margin-left:8px}

/* HEADER */
.hdr{background:var(--accent);padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:700;flex:1}
.hdr-cashier{font-size:11px;opacity:.85}

/* CATEGORY BAR */
.cat-bar{background:var(--s1);display:flex;overflow-x:auto;padding:5px 8px;gap:5px;flex-shrink:0;border-bottom:1px solid var(--border);scrollbar-width:none}
.cat-bar::-webkit-scrollbar{display:none}
.cat-btn{background:var(--s2);border:1px solid var(--border);color:#888;padding:7px 14px;border-radius:6px;cursor:pointer;white-space:nowrap;font-size:11px;font-weight:700;flex-shrink:0;text-transform:uppercase;letter-spacing:.6px;transition:all .15s}
.cat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden}

/* PRODUCT GRID */
.grid-wrap{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:#252540 transparent}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.p-btn{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:12px 10px 10px;cursor:pointer;text-align:center;transition:all .15s;position:relative;display:flex;flex-direction:column;gap:4px}
.p-btn:active{transform:scale(.96)}
.p-btn:hover{border-color:var(--accent);background:var(--s2)}
.p-img{width:100%;height:70px;object-fit:cover;border-radius:6px;margin-bottom:4px}
.p-name{font-size:12px;font-weight:700;line-height:1.3;word-break:break-word}
.p-price{font-size:13px;font-weight:800;color:var(--accent)}
.p-cat{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px}

/* CART */
.cart{width:300px;background:var(--s1);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.cart-items{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:#252540 transparent}
.cart-empty{text-align:center;color:#444;font-size:13px;padding:40px 10px}
.ci{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border)}
.ci-name{flex:1;font-size:12px;font-weight:600;line-height:1.3}
.ci-price{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap}
.ci-qty{display:flex;align-items:center;gap:4px}
.ci-q{width:22px;height:22px;border-radius:4px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.ci-q:hover{background:var(--accent);border-color:var(--accent)}
.ci-n{min-width:18px;text-align:center;font-size:13px;font-weight:700}

/* TOTALS */
.totals{padding:10px 12px;border-top:1px solid var(--border);font-size:13px}
.t-row{display:flex;justify-content:space-between;padding:3px 0}
.t-row.big{font-size:16px;font-weight:800;color:var(--accent);padding-top:6px;border-top:1px solid var(--border);margin-top:4px}

/* CHECKOUT BTN */
.btn-checkout{margin:10px;padding:14px;background:var(--accent);border:none;color:#fff;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;transition:opacity .15s}
.btn-checkout:hover{opacity:.88}
.btn-checkout:disabled{opacity:.3;cursor:not-allowed}

/* MODAL OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.overlay.show{display:flex}
.mbox{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:24px;width:min(360px,100%);max-height:90vh;overflow-y:auto}
.mtitle{font-size:17px;font-weight:800;margin-bottom:16px;text-align:center}

/* PAYMENT */
.pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.pay-btn{padding:10px;border:1.5px solid var(--border);background:var(--s2);color:#888;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:all .15s}
.pay-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,180,216,.08)}
.inp{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;outline:none;font-family:inherit;margin-bottom:10px}
.inp:focus{border-color:var(--accent)}
.change-row{display:flex;justify-content:space-between;font-size:15px;font-weight:800;padding:8px 0;border-top:1px solid var(--border);margin-top:4px;color:#4ade80}
.m-actions{display:flex;gap:8px;margin-top:16px}
.btn-cancel {flex:1;padding:11px;background:var(--s2);border:1px solid var(--border);color:#aaa;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.btn-confirm{flex:1;padding:11px;background:var(--accent);border:none;color:#fff;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700}

/* RECEIPT */
.receipt{font-family:'Courier New',monospace;font-size:13px;line-height:1.8;background:#fff;color:#000;padding:20px;border-radius:8px;margin-bottom:16px;white-space:pre-wrap}
.btn-new{width:100%;padding:13px;background:var(--accent);border:none;color:#fff;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px}
.btn-back{width:100%;padding:11px;background:var(--s2);border:1px solid var(--border);color:#aaa;border-radius:8px;font-size:13px;cursor:pointer}

@media(max-width:600px){
  .cart{width:100%;position:fixed;bottom:0;left:0;right:0;height:45vh;border-left:none;border-top:1px solid var(--border)}
  .main{flex-direction:column}
  .grid-wrap{padding-bottom:calc(45vh + 10px)}
}
</style>
</head>
<body>

<div class="demo-banner">
  Demo Mode — orders are not saved
  <a href="signup.html">Create your real POS →</a>
</div>

<div class="hdr">
  <div class="hdr-title" id="hdrTitle">Demo Store</div>
  <div class="hdr-cashier">Demo Cashier</div>
</div>

<div class="cat-bar" id="catBar"></div>

<div class="main">
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="cart">
    <div class="cart-items" id="cartItems">
      <div class="cart-empty">Tap a product to add it</div>
    </div>
    <div class="totals">
      <div class="t-row"><span>Subtotal</span><span id="tSub">—</span></div>
      <div class="t-row"><span id="taxLabel">VAT (12%)</span><span id="tTax">—</span></div>
      <div class="t-row big"><span>TOTAL</span><span id="tTot">—</span></div>
    </div>
    <button class="btn-checkout" id="btnCheckout" onclick="openPay()" disabled>Checkout</button>
  </div>
</div>

<!-- PAYMENT MODAL -->
<div class="overlay" id="mPay">
  <div class="mbox">
    <div class="mtitle">Payment</div>
    <div class="pay-methods">
      <button class="pay-btn active" onclick="selPay(this,'Cash')">Cash</button>
      <button class="pay-btn" onclick="selPay(this,'Card')">Card</button>
      <button class="pay-btn" onclick="selPay(this,'GCash')">GCash</button>
      <button class="pay-btn" onclick="selPay(this,'Maya')">Maya</button>
    </div>
    <div id="cashFields">
      <label style="font-size:12px;color:#888;font-weight:600">Amount Tendered</label>
      <input class="inp" id="tender" type="number" placeholder="0.00" oninput="calcChange()">
      <div class="change-row" id="changeRow" style="display:none">
        <span>Change</span><span id="changeAmt">0.00</span>
      </div>
    </div>
    <div class="m-actions">
      <button class="btn-cancel" onclick="closeM('mPay')">Cancel</button>
      <button class="btn-confirm" id="btnConfirmPay" onclick="confirmPay()">Confirm</button>
    </div>
  </div>
</div>

<!-- RECEIPT MODAL -->
<div class="overlay" id="mReceipt">
  <div class="mbox">
    <div class="mtitle">Receipt</div>
    <div class="receipt" id="receiptText"></div>
    <button class="btn-new" onclick="newSale()">+ New Sale</button>
    <button class="btn-back" onclick="window.location.href='index.html'">← Back to POSMaker</button>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const STORE_NAME = params.get('dname') || 'Demo Store';
const CUR        = params.get('dcur')  || '₱';
const TAX_RATE   = parseFloat(params.get('dtax') || '12');

let prods = [], cart = {}, payMethod = 'Cash';

// Load products from landing page builder or use defaults
const _saved = localStorage.getItem('pm_demo_prods');
localStorage.removeItem('pm_demo_prods');
prods = _saved ? JSON.parse(_saved) : [
  { id:'d1', name:'Burger',       category:'Food',   price:120 },
  { id:'d2', name:'Fries',        category:'Food',   price:60  },
  { id:'d3', name:'Fried Chicken',category:'Food',   price:150 },
  { id:'d4', name:'Rice',         category:'Food',   price:35  },
  { id:'d5', name:'Coke',         category:'Drinks', price:50  },
  { id:'d6', name:'Juice',        category:'Drinks', price:45  },
  { id:'d7', name:'Water',        category:'Drinks', price:30  },
  { id:'d8', name:'Coffee',       category:'Drinks', price:75  },
];

document.getElementById('hdrTitle').textContent = STORE_NAME;
document.getElementById('taxLabel').textContent  = `VAT (${TAX_RATE}%)`;

// Build category bar
function buildCats() {
  const cats = ['All', ...new Set(prods.map(p => p.category))];
  document.getElementById('catBar').innerHTML = cats.map((c,i) =>
    `<button class="cat-btn${i===0?' active':''}" onclick="selectCat(this,'${c}')">${c}</button>`
  ).join('');
}

function selectCat(btn, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProds(cat);
}

function renderProds(cat) {
  const list = cat === 'All' ? prods : prods.filter(p => p.category === cat);
  document.getElementById('grid').innerHTML = list.map(p => `
    <div class="p-btn" onclick="addToCart('${p.id}')">
      <div class="p-name">${p.name}</div>
      <div class="p-price">${CUR}${parseFloat(p.price).toFixed(2)}</div>
      <div class="p-cat">${p.category}</div>
    </div>
  `).join('') || '<div style="grid-column:1/-1;color:#444;text-align:center;padding:40px;font-size:13px">No products in this category</div>';
}

function addToCart(id) {
  const p = prods.find(x => x.id === id); if (!p) return;
  if (cart[id]) cart[id].qty++;
  else cart[id] = { ...p, qty: 1 };
  redrawCart();
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  redrawCart();
}

function redrawCart() {
  const items = Object.values(cart);
  const el = document.getElementById('cartItems');
  if (!items.length) {
    el.innerHTML = '<div class="cart-empty">Tap a product to add it</div>';
    document.getElementById('btnCheckout').disabled = true;
    document.getElementById('tSub').textContent = '—';
    document.getElementById('tTax').textContent = '—';
    document.getElementById('tTot').textContent = '—';
    return;
  }
  el.innerHTML = items.map(i => `
    <div class="ci">
      <div class="ci-name">${i.name}</div>
      <div class="ci-qty">
        <button class="ci-q" onclick="changeQty('${i.id}',-1)">−</button>
        <span class="ci-n">${i.qty}</span>
        <button class="ci-q" onclick="changeQty('${i.id}',+1)">+</button>
      </div>
      <div class="ci-price">${CUR}${(i.price * i.qty).toFixed(2)}</div>
    </div>
  `).join('');
  const sub = items.reduce((s,i) => s + i.price * i.qty, 0);
  const tax = sub * TAX_RATE / 100;
  const tot = sub + tax;
  document.getElementById('tSub').textContent = CUR + sub.toFixed(2);
  document.getElementById('tTax').textContent = CUR + tax.toFixed(2);
  document.getElementById('tTot').textContent = CUR + tot.toFixed(2);
  document.getElementById('btnCheckout').disabled = false;
}

// Payment
function openPay() {
  document.getElementById('tender').value = '';
  document.getElementById('changeRow').style.display = 'none';
  document.getElementById('mPay').classList.add('show');
}
function closeM(id) { document.getElementById(id).classList.remove('show'); }
function selPay(btn, m) {
  document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  payMethod = m;
  document.getElementById('cashFields').style.display = m === 'Cash' ? '' : 'none';
}
function calcChange() {
  const items = Object.values(cart);
  const sub = items.reduce((s,i) => s + i.price * i.qty, 0);
  const tot = sub + sub * TAX_RATE / 100;
  const tendered = parseFloat(document.getElementById('tender').value) || 0;
  const change = tendered - tot;
  const row = document.getElementById('changeRow');
  if (tendered > 0) {
    row.style.display = 'flex';
    document.getElementById('changeAmt').textContent = CUR + Math.max(0, change).toFixed(2);
    document.getElementById('changeAmt').style.color = change >= 0 ? '#4ade80' : '#ef4444';
  } else {
    row.style.display = 'none';
  }
}

function confirmPay() {
  const items = Object.values(cart);
  const sub = items.reduce((s,i) => s + i.price * i.qty, 0);
  const tax = sub * TAX_RATE / 100;
  const tot = sub + tax;
  const tendered = parseFloat(document.getElementById('tender').value) || tot;
  const change = Math.max(0, tendered - tot);

  if (payMethod === 'Cash' && tendered < tot) {
    document.getElementById('changeAmt').textContent = 'Insufficient amount';
    document.getElementById('changeAmt').style.color = '#ef4444';
    document.getElementById('changeRow').style.display = 'flex';
    return;
  }

  closeM('mPay');
  showReceipt({ items, sub, tax, tot, tendered, change });
}

function showReceipt({ items, sub, tax, tot, tendered, change }) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-PH', { year:'numeric', month:'short', day:'numeric' });
  const timeStr = now.toLocaleTimeString('en-PH', { hour:'2-digit', minute:'2-digit' });
  const line = '─'.repeat(32);
  let r = `${STORE_NAME}\n${line}\n${dateStr}  ${timeStr}\nCashier: Demo Cashier\n${line}\n`;
  items.forEach(i => {
    const total = (i.price * i.qty).toFixed(2);
    const nameLine = `${i.qty}x ${i.name}`.padEnd(24);
    r += `${nameLine}${CUR}${total}\n`;
  });
  r += `${line}\nSubtotal`.padEnd(25) + `${CUR}${sub.toFixed(2)}\n`;
  r += `VAT (${TAX_RATE}%)`.padEnd(25) + `${CUR}${tax.toFixed(2)}\n`;
  r += `TOTAL`.padEnd(25) + `${CUR}${tot.toFixed(2)}\n`;
  r += `${line}\nPayment: ${payMethod}\n`;
  if (payMethod === 'Cash') {
    r += `Tendered`.padEnd(25) + `${CUR}${tendered.toFixed(2)}\n`;
    r += `Change`.padEnd(25)   + `${CUR}${change.toFixed(2)}\n`;
  }
  r += `${line}\n[DEMO] This receipt was not saved.\nCreate a free account at POSMaker\nto save all your orders.`;
  document.getElementById('receiptText').textContent = r;
  document.getElementById('mReceipt').classList.add('show');
}

function newSale() {
  cart = {};
  closeM('mReceipt');
  redrawCart();
}

buildCats();
renderProds('All');
</script>
</body>
</html>

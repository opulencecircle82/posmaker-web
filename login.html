<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POSMaker — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090f;color:#f0f0f8;font-family:'Inter',sans-serif;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:min(420px,100%)}
.logo{text-align:center;font-size:22px;font-weight:800;margin-bottom:32px}
.logo span{color:#00b4d8}
.card{background:#111120;border:1px solid #252540;border-radius:16px;padding:36px}
h1{font-size:22px;font-weight:800;margin-bottom:4px}
.sub{font-size:14px;color:#8888aa;margin-bottom:28px}
.field{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;color:#aaa;margin-bottom:6px}
input{width:100%;padding:11px 14px;background:#09090f;border:1.5px solid #252540;border-radius:8px;color:#f0f0f8;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
input:focus{border-color:#00b4d8}
input::placeholder{color:#44445a}
.btn{width:100%;padding:13px;background:#00b4d8;border:none;color:#fff;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;font-family:'Inter',sans-serif;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.4;cursor:not-allowed}
.err{color:#ef4444;font-size:13px;min-height:18px;margin-bottom:10px;text-align:center}
.signup-link{text-align:center;font-size:13px;color:#8888aa;margin-top:18px}
.signup-link a{color:#00b4d8;font-weight:600}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1.5px solid #252540}
.tab-btn{flex:1;padding:10px 0;background:none;border:none;color:#8888aa;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:color .15s,border-color .15s}
.tab-btn.active{color:#00b4d8;border-bottom-color:#00b4d8}
.tab-pane{display:none}
.tab-pane.active{display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">POS<span>Maker</span></div>
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-owner" onclick="switchTab('owner')">Owner</button>
      <button class="tab-btn" id="tab-mgr" onclick="switchTab('mgr')">Manager / Staff</button>
    </div>

    <!-- Owner tab -->
    <div class="tab-pane active" id="pane-owner">
      <h1>Owner login</h1>
      <p class="sub">Sign in to manage your store.</p>
      <div class="field">
        <label>Email</label>
        <input id="email" type="email" placeholder="owner@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="pw" type="password" placeholder="Password" autocomplete="current-password">
      </div>
      <div class="err" id="err"></div>
      <button class="btn" id="btn" onclick="doLogin()">Log In →</button>
      <div class="signup-link">Don't have a store? <a href="signup.html">Create one free</a></div>
    </div>

    <!-- Manager / Staff tab -->
    <div class="tab-pane" id="pane-mgr">
      <h1>Staff login</h1>
      <p class="sub">Enter your username and password.</p>
      <div class="field">
        <label>Username</label>
        <input id="mgr-user" type="text" placeholder="username" autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="mgr-pw" type="password" placeholder="Password" autocomplete="current-password">
      </div>
      <div class="err" id="mgr-err"></div>
      <button class="btn" id="mgr-btn" onclick="doMgrLogin()">Log In →</button>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;
const _sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// Read ?sid= from URL (manager link from owner)
const _urlSid = new URLSearchParams(location.search).get('sid') || '';

function switchTab(tab) {
  document.getElementById('pane-owner').classList.toggle('active', tab === 'owner');
  document.getElementById('pane-mgr').classList.toggle('active', tab === 'mgr');
  document.getElementById('tab-owner').classList.toggle('active', tab === 'owner');
  document.getElementById('tab-mgr').classList.toggle('active', tab === 'mgr');
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('pw').value;
  const errEl = document.getElementById('err');
  const btn   = document.getElementById('btn');

  errEl.textContent = '';
  if (!email || !pw) { errEl.textContent = 'Please enter your email and password.'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';
  errEl.textContent = '';

  const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('Connection timed out. Check your internet and try again.')), 15000));
  try {
    const { data, error } = await Promise.race([
      _sb.auth.signInWithPassword({ email, password: pw }),
      timeout
    ]);
    if (error) { errEl.textContent = error.message; btn.disabled = false; btn.textContent = 'Log In →'; return; }

    const { data: store } = await Promise.race([
      _sb.from('stores').select('id').eq('owner_id', data.user.id).maybeSingle(),
      new Promise((_, rej) => setTimeout(() => rej(new Error('Connection timed out.')), 10000))
    ]);
    localStorage.setItem('pm_store_id', store?.id || '');
    location.href = store ? 'dashboard.html' : 'signup.html';
  } catch(e) {
    errEl.textContent = e.message;
    btn.disabled = false; btn.textContent = 'Log In →';
  }
}

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doMgrLogin() {
  const username = document.getElementById('mgr-user').value.trim();
  const pw       = document.getElementById('mgr-pw').value;
  const errEl    = document.getElementById('mgr-err');
  const btn      = document.getElementById('mgr-btn');

  errEl.textContent = '';
  if (!username || !pw) { errEl.textContent = 'Please enter your username and password.'; return; }
  if (!_urlSid) { errEl.textContent = 'No store ID found. Use the login link provided by your owner.'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  try {
    const hash = await sha256(pw);
    const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('Connection timed out.')), 15000));
    const { data: staff, error } = await Promise.race([
      _sb.from('store_users')
        .select('id,username,full_name,role,active')
        .eq('store_id', _urlSid)
        .eq('username', username)
        .eq('password_hash', hash)
        .maybeSingle(),
      timeout
    ]);
    if (error) throw error;
    if (!staff) { errEl.textContent = 'Invalid username or password.'; btn.disabled = false; btn.textContent = 'Log In →'; return; }
    if (!staff.active) { errEl.textContent = 'Your account has been disabled. Contact your owner.'; btn.disabled = false; btn.textContent = 'Log In →'; return; }

    const session = { store_id: _urlSid, staff_id: staff.id, name: staff.full_name || staff.username, role: staff.role, ts: Date.now() };
    localStorage.setItem('pm_mgr', JSON.stringify(session));
    location.href = 'manager.html?sid=' + _urlSid;
  } catch(e) {
    errEl.textContent = e.message || 'Login failed.';
    btn.disabled = false; btn.textContent = 'Log In →';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('pane-mgr').classList.contains('active')) doMgrLogin();
    else doLogin();
  }
});

// Auto-update service worker on every open
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    function _au(w){w.postMessage({type:'SKIP_WAITING'});}
    if(reg.waiting) _au(reg.waiting);
    reg.addEventListener('updatefound',()=>{const n=reg.installing;n.addEventListener('statechange',()=>{if(n.state==='installed'&&navigator.serviceWorker.controller)_au(n);});});
    reg.update().catch(()=>{});
  }).catch(()=>{});
  navigator.serviceWorker.addEventListener('controllerchange',()=>setTimeout(()=>location.reload(),400));
}

// If ?sid= present, pre-select Manager tab
if (_urlSid) switchTab('mgr');

// Auto-redirect if already logged in
(async () => {
  // Check manager session
  const mgrRaw = localStorage.getItem('pm_mgr');
  if (mgrRaw) {
    try {
      const mgr = JSON.parse(mgrRaw);
      if (mgr.ts && (Date.now() - mgr.ts) < 8 * 3600 * 1000) {
        location.href = 'manager.html?sid=' + mgr.store_id;
        return;
      }
    } catch(_) {}
    localStorage.removeItem('pm_mgr');
  }
  // Check owner session
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) return;
  const { data: store } = await _sb.from('stores').select('id').eq('owner_id', session.user.id).single();
  if (store) {
    localStorage.setItem('pm_store_id', store.id);
    location.href = 'dashboard.html';
  } else {
    location.href = 'signup.html';
  }
})();
</script>
</body>
</html>

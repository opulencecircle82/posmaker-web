<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.ico">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POSMaker — Affiliate Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="js/supabase.js"></script>
<script src="js/config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090f;color:#f0f0f8;font-family:'Inter',sans-serif;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:min(420px,100%)}
.logo{text-align:center;font-size:22px;font-weight:800;margin-bottom:8px}
.logo span{color:#00b4d8}
.sub{text-align:center;font-size:13px;color:#8888aa;margin-bottom:28px}
.card{background:#111120;border:1px solid #252540;border-radius:16px;padding:36px}
h1{font-size:22px;font-weight:800;margin-bottom:4px}
.sub2{font-size:14px;color:#8888aa;margin-bottom:28px}
.field{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;color:#aaa;margin-bottom:6px}
input{width:100%;padding:11px 14px;background:#09090f;border:1.5px solid #252540;border-radius:8px;color:#f0f0f8;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
input:focus{border-color:#00b4d8}
input::placeholder{color:#44445a}
.btn{width:100%;padding:13px;background:#00b4d8;border:none;color:#fff;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;font-family:'Inter',sans-serif;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.4;cursor:not-allowed}
.err{color:#ef4444;font-size:13px;min-height:18px;margin-bottom:10px;text-align:center}
.signup-link{text-align:center;font-size:13px;color:#8888aa;margin-top:18px}
.signup-link a{color:#00b4d8;font-weight:600}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:16px;left:16px;color:#8888aa;font-size:13px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:6px;z-index:99">&#8592; Back to Home</a>
<div class="wrap">
  <div class="logo">POS<span>Maker</span></div>
  <div class="sub">Partner Affiliate Program</div>
  <div class="card">
      <h1>Affiliate Login</h1>
      <p class="sub2">Sign in to check your affiliate status and referral link.</p>
      <div class="field">
        <label>Email</label>
        <input id="email" type="email" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="pw" type="password" placeholder="Password" autocomplete="current-password">
      </div>
      <div class="err" id="err"></div>
      <button class="btn" id="btn" onclick="doLogin()">Log In &rarr;</button>
      <div class="signup-link">Not an affiliate yet? <a href="agent-apply.html">Apply here</a></div>
  </div>
</div>

<script>
const { createClient } = supabase;
const _sb = createClient(SUPABASE_URL, SUPABASE_ANON);

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('pw').value;
  const errEl = document.getElementById('err');
  const btn   = document.getElementById('btn');

  errEl.textContent = '';
  if (!email || !pw) { errEl.textContent = 'Please enter your email and password.'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('Connection timed out. Check your internet and try again.')), 15000));
  try {
    const { error } = await Promise.race([
      _sb.auth.signInWithPassword({ email, password: pw }),
      timeout
    ]);
    if (error) { errEl.textContent = error.message; btn.disabled = false; btn.textContent = 'Log In →'; return; }
    location.href = 'affiliate-dashboard.html';
  } catch(e) {
    errEl.textContent = e.message;
    btn.disabled = false; btn.textContent = 'Log In →';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>

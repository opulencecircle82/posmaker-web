<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POSMaker — Create Your Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090f;color:#f0f0f8;font-family:'Inter',sans-serif;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:min(460px,100%)}
.logo{text-align:center;font-size:22px;font-weight:800;margin-bottom:32px}
.logo span{color:#00b4d8}
.card{background:#111120;border:1px solid #252540;border-radius:16px;padding:36px}
h1{font-size:22px;font-weight:800;margin-bottom:4px}
.sub{font-size:14px;color:#8888aa;margin-bottom:28px}
.field{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;color:#aaa;margin-bottom:6px}
input,select{width:100%;padding:11px 14px;background:#09090f;border:1.5px solid #252540;border-radius:8px;color:#f0f0f8;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:#00b4d8}
input::placeholder{color:#44445a}
select option{background:#111120;color:#f0f0f8}
select optgroup{background:#0a0a18;color:#8888aa;font-style:normal;font-size:11px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{width:100%;padding:13px;background:#00b4d8;border:none;color:#fff;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;font-family:'Inter',sans-serif;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.4;cursor:not-allowed}
.err{color:#ef4444;font-size:13px;min-height:18px;margin-bottom:10px;text-align:center}
.login-link{text-align:center;font-size:13px;color:#8888aa;margin-top:18px}
.login-link a{color:#00b4d8;font-weight:600}
.divider{border:none;border-top:1px solid #252540;margin:20px 0}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:16px;left:16px;color:#8888aa;font-size:13px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:6px;z-index:99">&#8592; Back to Home</a>
<div class="wrap">
  <div class="logo">POS<span>Maker</span></div>
  <div class="card">
    <h1>Create your store</h1>
    <p class="sub" id="subMsg">Set up your POS in under a minute — it's free.</p>
    <div id="sessionBanner" style="display:none;background:rgba(0,180,216,.1);border:1px solid #00b4d8;border-radius:8px;padding:10px 14px;font-size:13px;color:#00b4d8;margin-bottom:16px">
      ✓ You're logged in. Just fill in your store details below — email &amp; password not needed.
    </div>

    <div class="field">
      <label>Store Name</label>
      <input id="storeName" type="text" placeholder="e.g. Jollibee Taguig" autocomplete="organization">
    </div>
    <div class="field">
      <label>Type of Business</label>
      <select id="bizType">
        <option value="">— Select your business type —</option>
        <optgroup label="Food &amp; Beverage">
          <option value="Fast Food">🍔 Fast Food / Burger Shop</option>
          <option value="Carinderya">🍛 Carinderya / Turo-Turo</option>
          <option value="Coffee Shop">☕ Coffee Shop / Café</option>
          <option value="Bakery">🥖 Bakery / Panaderya</option>
          <option value="Lechon">🍖 Lechon / Ihaw-Ihaw</option>
          <option value="Pizza / Pasta">🍕 Pizza / Pasta</option>
          <option value="Seafood">🦐 Seafood / Paluto</option>
          <option value="Milk Tea / Drinks">🧋 Milk Tea / Drinks</option>
          <option value="Karinderya / Buffet">🍽 Buffet / Eat All You Can</option>
          <option value="Snack Bar">🍡 Snack Bar / Merienda</option>
        </optgroup>
        <optgroup label="Retail &amp; Supplies">
          <option value="Sari-Sari Store">🏪 Sari-Sari Store / Grocery</option>
          <option value="Bigasan">🌾 Bigasan / Rice Store</option>
          <option value="Hardware">🔧 Hardware Store</option>
          <option value="Agri Supply">🌱 Agri Supply / Farm Supplies</option>
          <option value="Drug Store">💊 Drug Store / Pharmacy</option>
          <option value="Pet Store">🐾 Pet Store / Veterinary</option>
          <option value="Clothing">👗 Clothing / Fashion</option>
          <option value="Electronics">📱 Electronics / Gadgets</option>
          <option value="Furniture">🪑 Furniture / Home Decor</option>
        </optgroup>
        <optgroup label="Services">
          <option value="Salon / Barbershop">✂️ Salon / Barbershop</option>
          <option value="Laundry">🧺 Laundry Shop</option>
          <option value="Printing / Photocopy">🖨 Printing / Photocopy</option>
          <option value="Auto Parts">🚗 Auto Parts / Accessories</option>
          <option value="School Supplies">📚 School / Office Supplies</option>
        </optgroup>
        <option value="Other">📦 Other</option>
      </select>
    </div>
    <div class="row2">
      <div class="field">
        <label>Currency Symbol</label>
        <input id="currency" type="text" value="₱" maxlength="4">
      </div>
      <div class="field">
        <label>Tax Rate (%)</label>
        <input id="taxRate" type="number" value="12" min="0" max="100" step="0.5">
      </div>
    </div>
    <hr class="divider">
    <div class="field">
      <label>Your Email</label>
      <input id="email" type="email" placeholder="owner@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="pw" type="password" placeholder="At least 6 characters" autocomplete="new-password">
    </div>

    <div class="err" id="err"></div>
    <button class="btn" id="btn" onclick="doSignup()">Create Store &amp; Continue →</button>
    <div class="login-link">Already have a store? <a href="login.html">Log in</a></div>
  </div>
</div>

<script>
const { createClient } = supabase;
const _sb = createClient(SUPABASE_URL, SUPABASE_ANON);

async function doSignup() {
  const storeName = document.getElementById('storeName').value.trim();
  const bizType   = document.getElementById('bizType').value;
  const currency  = document.getElementById('currency').value.trim() || '₱';
  const taxRate   = parseFloat(document.getElementById('taxRate').value) || 0;
  const email     = document.getElementById('email').value.trim();
  const pw        = document.getElementById('pw').value;
  const errEl     = document.getElementById('err');
  const btn       = document.getElementById('btn');

  errEl.textContent = '';
  if (!storeName) { errEl.textContent = 'Store name is required.'; return; }
  if (!bizType)   { errEl.textContent = 'Please select a business type.'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating store…';

  let userId;

  // Check if user is already authenticated (previous signup failed mid-way)
  const { data: { session: existingSession } } = await _sb.auth.getSession();
  if (existingSession) {
    userId = existingSession.user.id;
  } else {
    // Normal path: email + password required
    if (!email)          { errEl.textContent = 'Email is required.'; btn.disabled = false; btn.textContent = 'Create Store & Continue →'; return; }
    if (pw.length < 6)   { errEl.textContent = 'Password must be at least 6 characters.'; btn.disabled = false; btn.textContent = 'Create Store & Continue →'; return; }

    const { data: authData, error: authErr } = await _sb.auth.signUp({ email, password: pw });
    if (authErr) {
      // If already registered, try signing in instead
      if (authErr.message.toLowerCase().includes('already registered') || authErr.message.toLowerCase().includes('already been registered')) {
        const { data: signIn, error: signInErr } = await _sb.auth.signInWithPassword({ email, password: pw });
        if (signInErr) {
          errEl.textContent = 'This email is already registered. Please log in instead.';
          btn.disabled = false; btn.textContent = 'Create Store & Continue →';
          // Show link to login
          errEl.innerHTML = 'This email is already registered. <a href="login.html" style="color:#00b4d8;font-weight:600">Log in here</a> — then complete your store setup from the dashboard.';
          return;
        }
        userId = signIn.user.id;
      } else {
        errEl.textContent = authErr.message;
        btn.disabled = false; btn.textContent = 'Create Store & Continue →';
        return;
      }
    } else {
      userId = authData.user.id;
    }
  }

  // Check if this user already has a store
  const { data: existing } = await _sb.from('stores').select('id').eq('owner_id', userId).single();
  if (existing) {
    localStorage.setItem('pm_store_id', existing.id);
    location.href = 'dashboard.html'; return;
  }

  // Generate unique store code
  async function genUniqueCode(name) {
    const prefix = (name||'STORE').toUpperCase().replace(/[^A-Z0-9]/g,'').substring(0,6).padEnd(3,'X');
    let code, taken = true;
    while (taken) {
      code = prefix + String(Math.floor(1000 + Math.random() * 9000));
      const { data } = await _sb.from('stores').select('id').eq('store_code', code).maybeSingle();
      taken = !!data;
    }
    return code;
  }
  const storeCode = await genUniqueCode(storeName);

  // Create store record (fallback without business_type if column not yet in DB)
  let { data: store, error: storeErr } = await _sb
    .from('stores')
    .insert({ name: storeName, owner_id: userId, currency, tax_rate: taxRate, business_type: bizType, store_code: storeCode })
    .select().single();

  if (storeErr && storeErr.message && storeErr.message.toLowerCase().includes('column')) {
    ({ data: store, error: storeErr } = await _sb
      .from('stores')
      .insert({ name: storeName, owner_id: userId, currency, tax_rate: taxRate, store_code: storeCode })
      .select().single());
  }

  if (storeErr) {
    errEl.textContent = storeErr.message;
    btn.disabled = false; btn.textContent = 'Create Store & Continue →';
    return;
  }

  // Auto-create default product categories based on business type
  const prodCats = getDefaultProdCats(bizType);
  const invCats  = getDefaultInvCats(bizType);
  if (prodCats.length) {
    await _sb.from('categories').insert(prodCats.map(n => ({ store_id: store.id, name: n, type: 'prod' })));
  }
  if (invCats.length) {
    await _sb.from('categories').insert(invCats.map(n => ({ store_id: store.id, name: n, type: 'inv' })));
  }

  localStorage.setItem('pm_store_id', store.id);
  location.href = 'dashboard.html';
}

// Default product categories per business type
function getDefaultProdCats(biz) {
  const map = {
    'Fast Food':          ['Burger','Chicken','Fries','Drinks','Combo Meals','Desserts'],
    'Carinderya':         ['Viand','Soup','Rice / Pasta','Drinks','Snacks'],
    'Coffee Shop':        ['Coffee','Tea','Frappe','Pastries','Snacks'],
    'Bakery':             ['Bread','Cakes','Pastries','Drinks','Other'],
    'Lechon':             ['Lechon','Chicharon','Rice','Sides','Drinks'],
    'Pizza / Pasta':      ['Pizza','Pasta','Sides','Drinks','Desserts'],
    'Seafood':            ['Fish','Shellfish','Shrimp','Squid','Sides','Drinks'],
    'Milk Tea / Drinks':  ['Milk Tea','Coffee','Fruit Tea','Lemonade','Snacks'],
    'Karinderya / Buffet':['Rice','Viand','Soup','Dessert','Drinks'],
    'Snack Bar':          ['Snacks','Sandwiches','Drinks','Sweets'],
    'Sari-Sari Store':    ['Canned Goods','Beverages','Snacks','Personal Care','Condiments'],
    'Bigasan':            ['Rice','Grains','Other'],
    'Hardware':           ['Tools','Electrical','Plumbing','Paint','Construction Materials','Accessories'],
    'Agri Supply':        ['Seeds','Fertilizer','Pesticide','Tools','Other'],
    'Drug Store':         ['Prescription','OTC Medicines','Vitamins','Personal Care','Medical Supplies'],
    'Pet Store':          ['Dog','Cat','Fish','Birds','Accessories','Grooming'],
    'Clothing':           ['Men','Women','Kids','Accessories','Shoes'],
    'Electronics':        ['Phones','Accessories','Gadgets','Audio','Cables'],
    'Furniture':          ['Living Room','Bedroom','Dining','Office','Decor'],
    'Salon / Barbershop': ['Haircut','Hair Color','Treatment','Nails','Other Services'],
    'Laundry':            ['Wash','Dry & Fold','Iron','Dry Clean'],
    'Printing / Photocopy':['Printing','Photocopy','Lamination','Binding','Other'],
    'Auto Parts':         ['Engine Parts','Electrical','Body Parts','Oils & Fluids','Accessories'],
    'School Supplies':    ['Notebooks','Pens & Pencils','Art Supplies','Bags','Others'],
  };
  return map[biz] || ['General'];
}

// Default inventory categories per business type
function getDefaultInvCats(biz) {
  const foodTypes = ['Fast Food','Carinderya','Coffee Shop','Bakery','Lechon','Pizza / Pasta','Seafood','Milk Tea / Drinks','Karinderya / Buffet','Snack Bar'];
  if (foodTypes.includes(biz)) return ['Ingredients','Packaging','Beverages','Condiments'];
  if (biz === 'Hardware')      return ['Tools','Electrical','Plumbing','Paint'];
  if (biz === 'Agri Supply')   return ['Seeds','Fertilizer','Pesticide'];
  if (biz === 'Drug Store')    return ['Medicines','Personal Care','Medical Supplies'];
  if (biz === 'Salon / Barbershop') return ['Hair Products','Nail Products','Consumables'];
  return [];
}

// Allow Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });

// If already logged in: redirect to dashboard if store exists, else show banner
(async () => {
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) return;
  const { data: store } = await _sb.from('stores').select('id').eq('owner_id', session.user.id).maybeSingle();
  if (store) { location.replace('dashboard.html'); return; }
  document.getElementById('sessionBanner').style.display = 'block';
  document.getElementById('email').closest('.field').style.display = 'none';
  document.getElementById('pw').closest('.field').style.display = 'none';
  document.querySelector('.divider').style.display = 'none';
})();
</script>
</body>
</html>

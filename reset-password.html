<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POSMaker — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090f;color:#f0f0f8;font-family:'Inter',sans-serif;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:min(420px,100%)}
.logo{text-align:center;font-size:22px;font-weight:800;margin-bottom:32px}
.logo span{color:#00b4d8}
.card{background:#111120;border:1px solid #252540;border-radius:16px;padding:36px}
h1{font-size:20px;font-weight:800;margin-bottom:4px}
.sub{font-size:14px;color:#8888aa;margin-bottom:24px}
.field{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;color:#aaa;margin-bottom:6px}
input{width:100%;padding:11px 14px;background:#09090f;border:1.5px solid #252540;border-radius:8px;color:#f0f0f8;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
input:focus{border-color:#00b4d8}
.btn{width:100%;padding:13px;background:#00b4d8;border:none;color:#fff;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;font-family:'Inter',sans-serif;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.4;cursor:not-allowed}
.err{color:#ef4444;font-size:13px;min-height:18px;margin-bottom:10px;text-align:center}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:42px}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8888aa;font-size:17px;padding:0;line-height:1}
.done{text-align:center}
.done .ico{font-size:48px;margin-bottom:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">POS<span>Maker</span></div>
  <div class="card" id="cardForm">
    <h1>Set New Password</h1>
    <p class="sub">Enter your new password below.</p>
    <div class="field">
      <label>New Password</label>
      <div class="pw-wrap">
        <input id="pw1" type="password" placeholder="Min 8 chars, A-Z, 0-9, symbol" autocomplete="new-password">
        <button type="button" class="pw-eye" onclick="togglePw('pw1',this)">&#128065;</button>
      </div>
      <div id="pwStrength" style="font-size:11px;margin-top:5px;min-height:14px"></div>
    </div>
    <div class="field">
      <label>Confirm New Password</label>
      <div class="pw-wrap">
        <input id="pw2" type="password" placeholder="Re-enter new password" autocomplete="new-password">
        <button type="button" class="pw-eye" onclick="togglePw('pw2',this)">&#128065;</button>
      </div>
    </div>
    <div class="err" id="errMsg"></div>
    <button class="btn" id="btnSubmit" onclick="doReset()">Update Password</button>
  </div>
  <div class="card done" id="cardDone" style="display:none">
    <div class="ico">&#10004;&#65039;</div>
    <h1 style="margin-bottom:8px">Password Updated!</h1>
    <p class="sub" style="margin-bottom:20px">Your password has been changed successfully.</p>
    <button class="btn" onclick="location.href='login.html'">Go to Login</button>
  </div>
  <div class="card done" id="cardInvalid" style="display:none">
    <div class="ico">&#128683;</div>
    <h1 style="margin-bottom:8px">Invalid or Expired Link</h1>
    <p class="sub" style="margin-bottom:20px">This reset link has expired or already been used. Please request a new one.</p>
    <button class="btn" onclick="location.href='login.html'">Back to Login</button>
  </div>
</div>

<script>
const { createClient } = supabase;
const _sb = createClient(SUPABASE_URL, SUPABASE_ANON);

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.innerHTML = inp.type === 'password' ? '&#128065;' : '&#128584;';
}
function validatePassword(pw) {
  if (pw.length < 8)            return 'Password must be at least 8 characters.';
  if (!/[A-Z]/.test(pw))        return 'Password must include an uppercase letter (A-Z).';
  if (!/[0-9]/.test(pw))        return 'Password must include a number (0-9).';
  if (!/[^A-Za-z0-9]/.test(pw)) return 'Password must include a symbol (@, #, &, etc.).';
  return null;
}

document.getElementById('pw1').addEventListener('input', function() {
  const pw = this.value;
  const el = document.getElementById('pwStrength');
  if (!pw) { el.textContent = ''; return; }
  const checks = [pw.length >= 8, /[A-Z]/.test(pw), /[0-9]/.test(pw), /[^A-Za-z0-9]/.test(pw)];
  const passed = checks.filter(Boolean).length;
  const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
  const labels = ['Weak','Fair','Good','Strong'];
  const missing = [!checks[0]&&'8+ chars',!checks[1]&&'uppercase',!checks[2]&&'number',!checks[3]&&'symbol'].filter(Boolean);
  el.innerHTML = `<span style="color:${colors[passed-1]||'#ef4444'}">${labels[passed-1]||'Too weak'}</span>${missing.length?' — needs: '+missing.join(', '):''}`;
});

async function doReset() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const errEl = document.getElementById('errMsg');
  errEl.textContent = '';
  const pwErr = validatePassword(pw1);
  if (pwErr) { errEl.textContent = pwErr; return; }
  if (pw1 !== pw2) { errEl.textContent = 'Passwords do not match.'; return; }
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = 'Updating…';
  const { error } = await _sb.auth.updateUser({ password: pw1 });
  if (error) {
    errEl.textContent = error.message;
    btn.disabled = false; btn.textContent = 'Update Password';
    return;
  }
  document.getElementById('cardForm').style.display = 'none';
  document.getElementById('cardDone').style.display = '';
}

// Handle Supabase recovery session from email link (hash-based or PKCE)
(async () => {
  const hash = new URLSearchParams(location.hash.slice(1));
  const type = hash.get('type');
  const accessToken = hash.get('access_token');
  const refreshToken = hash.get('refresh_token');

  if (type === 'recovery' && accessToken) {
    const { error } = await _sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
    if (error) {
      document.getElementById('cardForm').style.display = 'none';
      document.getElementById('cardInvalid').style.display = '';
    }
    return;
  }

  // PKCE flow — Supabase auto-handles token from URL, just check session
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) {
    document.getElementById('cardForm').style.display = 'none';
    document.getElementById('cardInvalid').style.display = '';
  }
})();
</script>
</body>
</html>

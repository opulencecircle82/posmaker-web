<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pay — POSMaker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e1120;color:#f0f0f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px}
.card{background:#1a1d2e;border-radius:20px;padding:28px 24px;width:100%;max-width:400px;margin-top:8px;text-align:center}
.logo{width:64px;height:64px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block}
.store-name{font-size:22px;font-weight:800;margin-bottom:4px}
.label{font-size:15px;color:#9aa0c0;margin-bottom:6px}
.amount{font-size:56px;font-weight:800;color:#00b4d8;margin:8px 0 20px}
.btn-pay{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:20px;border-radius:14px;border:none;font-size:19px;font-weight:800;cursor:pointer;transition:.15s;letter-spacing:.3px}
.btn-pay:active{transform:scale(.97)}
.gcash-btn{background:#007AFF;color:#fff}
.maya-btn{background:#00C9A7;color:#fff}
.bpi-btn{background:#B22222;color:#fff}
.bdo-btn{background:#003399;color:#fff}
.unionbank-btn{background:#E31837;color:#fff}
.metrobank-btn{background:#0032A0;color:#fff}
.hint{font-size:13px;color:#6a6d8a;margin-top:12px;line-height:1.5}
.step{display:none}
.step.active{display:block}
.big-icon{font-size:70px;margin:16px 0 10px}
.confirmed-title{font-size:26px;font-weight:800;color:#4ade80;margin-bottom:8px}
.btn-confirm{width:100%;padding:18px;border-radius:14px;border:none;font-size:17px;font-weight:800;cursor:pointer;background:#22c55e;color:#fff;margin-top:16px;transition:.15s}
.btn-back{width:100%;padding:14px;border-radius:14px;border:1px solid #2a2d45;background:transparent;color:#9aa0c0;font-size:14px;cursor:pointer;margin-top:8px}
.countdown{font-size:14px;color:#9aa0c0;margin-top:10px}
.qr-toggle{font-size:13px;color:#9aa0c0;text-decoration:underline;cursor:pointer;margin-top:14px;display:inline-block;background:none;border:none}
.qr-fallback{display:none;margin-top:14px}
.qr-fallback.show{display:block}
.qr-img{width:230px;height:230px;border-radius:12px;background:#fff;padding:8px;margin:10px auto;display:block;object-fit:contain}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<div class="card">
  <!-- Step 1: Pay button -->
  <div id="s1" class="step active">
    <img id="sLogo" class="logo" style="display:none">
    <div id="sName" class="store-name">Loading...</div>
    <div id="sMethod" class="label">Pay via GCash</div>
    <div id="sAmount" class="amount">₱0.00</div>
    <button id="payBtn" class="btn-pay gcash-btn" onclick="openApp()" style="display:none">
      <span id="payIcon">💙</span>
      <span id="payLabel">Open GCash App</span>
    </button>
    <p id="s1Hint" class="hint">Tap to open the app, pay the amount above, then come back here to confirm.</p>
    <!-- QR fallback (hidden by default) -->
    <button class="qr-toggle" onclick="toggleQr()">No app? Show QR code instead</button>
    <div id="qrFallback" class="qr-fallback">
      <img id="bankQr" class="qr-img" style="display:none">
      <p class="hint">Screenshot this QR → open your app → Scan from Gallery</p>
    </div>
  </div>

  <!-- Step 2: Confirm after returning from app -->
  <div id="s2" class="step">
    <div class="big-icon">💸</div>
    <div class="confirmed-title" style="color:#f0f0f8">Payment Done?</div>
    <p class="hint" style="font-size:15px;margin-top:4px">Did you successfully pay <strong style="color:#00b4d8" id="s2Amount"></strong> in <span id="s2Method">GCash</span>?</p>
    <button class="btn-confirm" onclick="confirmPaid()">✅ Yes — Notify Cashier</button>
    <button class="btn-back" onclick="backToApp()">← No, go back</button>
    <p id="cdText" class="countdown"></p>
  </div>

  <!-- Step 3: Done -->
  <div id="s3" class="step">
    <div class="big-icon">✅</div>
    <div class="confirmed-title">Cashier Notified!</div>
    <p class="hint" style="font-size:15px;margin-top:6px">Payment confirmed.<br>You may now close this page.</p>
  </div>
</div>

<script>
const SB_URL  = 'https://djvwlwnnlldoppomhbap.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdndsd25ubGxkb3Bwb21oYmFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MzgzNTEsImV4cCI6MjA5NTQxNDM1MX0.7uJUS1mLQGHUstuGvKMHzPj5aNluha0-Hf2wg8K1UA0';
const _sb = supabase.createClient(SB_URL, SB_ANON);

const P        = new URLSearchParams(location.search);
const STORE_ID = P.get('store') || '';
const METHOD   = (P.get('method') || 'gcash').toLowerCase();
const AMOUNT   = parseFloat(P.get('amount') || '0');
const REF      = P.get('ref') || '';

const LABELS = { gcash:'GCash', maya:'Maya', bpi:'BPI', bdo:'BDO', unionbank:'UnionBank', metrobank:'Metrobank' };
const QR_COLS = { gcash:'gcash_qr_b64', maya:'maya_qr_b64', bpi:'bpi_qr_b64', bdo:'bdo_qr_b64', unionbank:'unionbank_qr_b64', metrobank:'metrobank_qr_b64' };
const APP_CFG = {
  gcash:     { icon:'💙', cls:'gcash-btn',     pkg:'com.globe.gcash.android', iosScheme:'gcash' },
  maya:      { icon:'💚', cls:'maya-btn',      pkg:'ph.maya.ph',              iosScheme:'maya' },
  bpi:       { icon:'❤️', cls:'bpi-btn',       pkg:'com.bpiexpressonline',    iosScheme:'bpi' },
  bdo:       { icon:'💙', cls:'bdo-btn',       pkg:'com.bdo.bankofphil',      iosScheme:'bdo' },
  unionbank: { icon:'❤️', cls:'unionbank-btn', pkg:'com.unionbankph.online',  iosScheme:'unionbank' },
  metrobank: { icon:'💙', cls:'metrobank-btn', pkg:'com.metrobankdirect',     iosScheme:'metrobank' },
};

// EMVCo / InstaPay dynamic QR builder (embeds amount into QR payload)
function _crc16(data) {
  let crc = 0xFFFF;
  for (let i = 0; i < data.length; i++) {
    crc ^= data.charCodeAt(i) << 8;
    for (let j = 0; j < 8; j++) crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) : (crc << 1);
  }
  return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
}
function buildDynamicQr(staticPayload, amount) {
  try {
    const fields = [];
    let i = 0;
    while (i < staticPayload.length) {
      const tag = staticPayload.slice(i, i + 2);
      const len = parseInt(staticPayload.slice(i + 2, i + 4), 10);
      if (isNaN(len) || i + 4 + len > staticPayload.length) break;
      fields.push({ tag, value: staticPayload.slice(i + 4, i + 4 + len) });
      i += 4 + len;
    }
    if (!fields.length || fields[0].tag !== '00') return null;
    let working = fields.filter(f => f.tag !== '54' && f.tag !== '63');
    const f01 = working.find(f => f.tag === '01');
    if (f01) f01.value = '12';
    const amtStr = parseFloat(amount).toFixed(2);
    const insertIdx = working.findIndex(f => parseInt(f.tag) >= 55);
    if (insertIdx >= 0) working.splice(insertIdx, 0, { tag: '54', value: amtStr });
    else working.push({ tag: '54', value: amtStr });
    let out = '';
    for (const f of working) out += f.tag + String(f.value.length).padStart(2, '0') + f.value;
    out += '6304';
    return out + _crc16(out);
  } catch (_) { return null; }
}

let _appOpenTime = 0;
let _cdTimer = null;
let _confirmed = false;
let _dynamicPayload = null;

document.getElementById('sAmount').textContent = '₱' + AMOUNT.toFixed(2);
document.getElementById('sMethod').textContent = 'Pay via ' + (LABELS[METHOD] || METHOD.toUpperCase());
document.getElementById('s2Amount').textContent = '₱' + AMOUNT.toFixed(2);
document.getElementById('s2Method').textContent = LABELS[METHOD] || METHOD.toUpperCase();

function show(id) {
  ['s1','s2','s3'].forEach(s => document.getElementById(s).classList.toggle('active', s === id));
}

async function init() {
  if (!STORE_ID) { document.getElementById('sName').textContent = 'Invalid link'; return; }
  const col = QR_COLS[METHOD] || 'gcash_qr_b64';
  const extra = METHOD === 'gcash' ? ',gcash_qr_payload' : '';
  const { data: s } = await _sb.from('stores').select('name,logo_b64,' + col + extra).eq('id', STORE_ID).maybeSingle();
  if (!s) { document.getElementById('sName').textContent = 'Store not found'; return; }

  document.getElementById('sName').textContent = s.name || 'Store';
  if (s.logo_b64) {
    const l = document.getElementById('sLogo');
    l.src = 'data:image/png;base64,' + s.logo_b64;
    l.style.display = '';
  }

  // Build deep-link payload
  if (METHOD === 'gcash' && s.gcash_qr_payload) {
    _dynamicPayload = buildDynamicQr(s.gcash_qr_payload, AMOUNT);
  }

  // Show QR fallback image
  const qrData = s[col];
  if (qrData) {
    const q = document.getElementById('bankQr');
    q.src = 'data:image/png;base64,' + qrData;
    q.style.display = '';
  }

  // Setup pay button
  const cfg = APP_CFG[METHOD];
  if (cfg) {
    const btn = document.getElementById('payBtn');
    btn.className = 'btn-pay ' + cfg.cls;
    document.getElementById('payIcon').textContent = cfg.icon;
    document.getElementById('payLabel').textContent = 'Open ' + (LABELS[METHOD] || METHOD) + ' App';
    btn.style.display = 'flex';
    document.getElementById('s1Hint').textContent = 'Tap to open ' + (LABELS[METHOD] || METHOD) + ' app, pay ₱' + AMOUNT.toFixed(2) + ', then come back here to confirm.';
  } else {
    document.getElementById('s1Hint').textContent = 'Please pay ₱' + AMOUNT.toFixed(2) + ' via ' + (LABELS[METHOD] || METHOD) + '.';
  }
}

function openApp() {
  const cfg = APP_CFG[METHOD];
  if (!cfg) return;
  _appOpenTime = Date.now();
  const isAndroid = /android/i.test(navigator.userAgent);
  if (isAndroid) {
    // Launch app via MAIN/LAUNCHER intent — works even if GCash has no deep-link scheme registered
    window.location.href = `intent://#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=${cfg.pkg};end`;
  } else {
    window.location.href = cfg.iosScheme + '://';
  }
}

// When customer returns from bank app, show confirmation
document.addEventListener('visibilitychange', () => {
  if (document.hidden || _confirmed || _appOpenTime === 0) return;
  const elapsed = Date.now() - _appOpenTime;
  if (elapsed < 2000) return; // too fast — probably didn't open app
  _appOpenTime = 0;
  show('s2');
  startCountdown(10);
});

function startCountdown(secs) {
  clearInterval(_cdTimer);
  const el = document.getElementById('cdText');
  el.textContent = 'Auto-confirming in ' + secs + 's...';
  _cdTimer = setInterval(() => {
    secs--;
    if (secs <= 0) { clearInterval(_cdTimer); el.textContent = ''; confirmPaid(); }
    else el.textContent = 'Auto-confirming in ' + secs + 's...';
  }, 1000);
}

function backToApp() {
  clearInterval(_cdTimer);
  document.getElementById('cdText').textContent = '';
  _appOpenTime = 0;
  show('s1');
}

async function confirmPaid() {
  if (_confirmed) return;
  _confirmed = true;
  clearInterval(_cdTimer);
  document.getElementById('cdText').textContent = '';
  show('s3');
  try {
    const ch = _sb.channel('display-' + STORE_ID);
    await new Promise(resolve => {
      ch.subscribe(st => {
        if (st === 'SUBSCRIBED') {
          ch.send({ type:'broadcast', event:'customer_paid',
            payload:{ method: LABELS[METHOD] || METHOD, amount: AMOUNT, ref: REF, verified: true }
          }).then(resolve);
        }
      });
    });
  } catch (_) {}
}

function toggleQr() {
  const el = document.getElementById('qrFallback');
  el.classList.toggle('show');
}

init();
</script>
</body>
</html>
